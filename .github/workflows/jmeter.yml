name: JMeter Performance Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  jmeter-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Create result directories
        run: |
          mkdir -p results
          mkdir -p reports

      - name: Load test
        run: apache-jmeter-5.6.3/bin/jmeter -n -t jmeter/load_test.jmx -l results/load_test.jtl

      - name: Stress test
        run: apache-jmeter-5.6.3/bin/jmeter -n -t jmeter/stress_test.jmx -l results/stress_test.jtl

      - name: Soak test (max 15 minutes)
        run: |
          timeout 15m apache-jmeter-5.6.3/bin/jmeter -n -t jmeter/soak_test.jmx -l results/soak_test.jtl || true

      - name: Upload JTL Results
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-jtl-results
          path: results/

      - name: Generate HTML Reports
        run: |
          apache-jmeter-5.6.3/bin/jmeter -g results/load_test.jtl -o reports/load_test_html
          apache-jmeter-5.6.3/bin/jmeter -g results/stress_test.jtl -o reports/stress_test_html
          apache-jmeter-5.6.3/bin/jmeter -g results/soak_test.jtl -o reports/soak_test_html

      - name: Upload HTML Reports
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-reports
          path: reports/
